<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css" />
</head>
<body>
    <div class="sky">
        <main class="dashboard">
            <header class="dashboard-header">
              <div class="search-weather">
                 <p class="brand-eyebrow">LIVE READOUT </p>
                 <H1 class="brand-name">Weather Station </H1>
             </div> 
             <form class="search-city">
               <input class="city" type="text" placeholder="Search a city"/>
               <button class="search-btn" type="submit" aria-label="search" >
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                 </svg>
               </button>
             </form>   
            </header>
            <section class="readout hidden">
                <div class="readout-primary">
                    <div class="readout-place">
                        <h2 class="readout-city">Delhi</h2>
                        <p class="readout-updated">not updated yet</p>
                    </div>
                    <div class="readout-temp-block">
                        <span class="readout-temp">19°</span>
                        <span class="readout-unit">
                            <button class="unit unitc">°C</button>
                            <span class="unit-divide">/</span>
                            <button class="unit unitf">°F</button>
                        </span>
                    </div>
                    <div class="readout-condition">
                        <span class="condition-icon">-</span>
                        <span class="condition-text">-</span>
                    </div>
                    <hr color="#8b97a8" />
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label"> FEELS LIKE</span>
                            <Span class="feels-like">0</Span>
                        </div>
                        <div class="stat">
                            <span class="stat-label"> HUMIDITY</span>
                            <Span class="humidity">-</Span>
                        </div>
                        <div class="stat">
                            <span class="stat-label"> WIND</span>
                            <Span class="wind">-</Span>
                        </div>
                    </div>
                    <p class="reset">Auto Reset In Every 10 Min <span class="next-reset">10:00</span></p>
                </div>
            </section>
        </main>
    </div>
    
    <script src="my.js"></script>
</body>
</html>
